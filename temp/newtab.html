  <!-- Theme CSS will be loaded dynamically -->
  <script>
    // Load theme CSS on page load
    window.addEventListener('DOMContentLoaded', function() {
      const currentTheme = localStorage.getItem('theme') || 'Earth';
      const themeMap = {
        'Earth': '/assets/css/themes/Earth.css?v=00',
        'Virellus': '/assets/css/themes/Virellus.css?v=00',
        'Neptune': '/assets/css/themes/Neptune.css?v=00',
        'Mars': '/assets/css/themes/Mars.css?v=00',
        'Solar': '/assets/css/themes/Solar.css?v=00'
      };
      
      if (themeMap[currentTheme]) {
        const themeLink = document.createElement('link');
        themeLink.rel = 'stylesheet';
        themeLink.href = themeMap[currentTheme];
        themeLink.id = 'theme-css';
        document.head.appendChild(themeLink);
      }
    });
    
    // Listen for theme changes
    window.addEventListener('storage', function(e) {
      if (e.key === 'theme') {
        const themeLink = document.getElementById('theme-css');
        if (themeLink) {
          themeLink.remove();
        }
        
        const themeMap = {
          'Earth': '/assets/css/themes/Earth.css?v=00',
          'Virellus': '/assets/css/themes/Virellus.css?v=00',
          'Neptune': '/assets/css/themes/Neptune.css?v=00',
          'Mars': '/assets/css/themes/Mars.css?v=00',
          'Solar': '/assets/css/themes/Solar.css?v=00'
        };
        
        if (themeMap[e.newValue]) {
          const newThemeLink = document.createElement('link');
          newThemeLink.rel = 'stylesheet';
          newThemeLink.href = themeMap[e.newValue];
          newThemeLink.id = 'theme-css';
          document.head.appendChild(newThemeLink);
        }
      }
    });
  </script>
